<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Odoo Email Connector</title>
    <style>
      html,
      body {
        height: 100%;
      }
      body {
        font-family: -moz-info, sans-serif;
        padding: 1.5rem;
        margin: 0;
        font-size: 14px;
        display: flex;
        flex-direction: column;
        box-sizing: border-box;
      }
      #message {
        flex: 1;
        margin-bottom: 1.2rem;
        line-height: 1.6;
        word-break: break-all;
        overflow-y: auto;
      }
      #buttons {
        display: flex;
        gap: 0.5rem;
        justify-content: flex-end;
        flex-shrink: 0;
      }
      button {
        padding: 0.5rem 1.2rem;
        font-size: 13px;
        min-width: 6rem;
      }
    </style>
  </head>
  <body>
    <p id="message"></p>
    <div id="buttons"></div>
    <script src="lib/domUtils.js"></script>
    <script src="dialog.js"></script>
  </body>
</html>
